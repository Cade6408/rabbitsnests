<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Mice vs Slimes</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      /* 1. Reset and Center the Container */
      html, body { 
        width: 100%; 
        height: 100%; 
        margin: 0; 
        padding: 0; 
        overflow: hidden; 
        background-color: #000; /* Black margins */
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* 2. The Container handles the 16:9 Aspect Ratio */
      #unity-container { 
        position: relative;
        width: 100%;
        height: 100%;
        max-width: 100vw;
        max-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* 3. The Canvas scales to fit while maintaining ratio */
      #unity-canvas { 
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        aspect-ratio: 16 / 9; /* The magic 1920x1080 ratio */
        object-fit: contain;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      
      #unity-footer { display: none; } 

      #custom-fullscreen-btn {
        position: absolute;
        right: 15px;
        bottom: 15px;
        width: 30px;
        height: 30px;
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid white;
        border-radius: 4px;
        cursor: pointer;
        z-index: 100;
        display: none;
        transition: 0.2s;
      }
      #custom-fullscreen-btn:hover { background: rgba(255, 255, 255, 0.4); }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="custom-fullscreen-btn" title="Fullscreen"></div>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var fullscreenBtn = document.querySelector("#custom-fullscreen-btn");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        if (warningBanner) {
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px;';
            else {
              if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
              setTimeout(function() {
                warningBanner.removeChild(div);
                updateBannerVisibility();
              }, 5000);
            }
            updateBannerVisibility();
        }
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Mice vs Slimes V0.2.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Mice vs Slimes V0.2.data.unityweb",
        frameworkUrl: buildUrl + "/Mice vs Slimes V0.2.framework.js.unityweb",
        codeUrl: buildUrl + "/Mice vs Slimes V0.2.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "CCM Industries",
        productName: "Mice vs Slimes",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      // Set to true to ensure Unity doesn't fight our CSS sizing
      config.matchWebGLToCanvasSize = true;

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          fullscreenBtn.style.display = "block";
          fullscreenBtn.onclick = () => { unityInstance.SetFullscreen(1); };
        }).catch((message) => { alert(message); });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
