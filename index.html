<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Mice vs Slimes</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      /* Makes the game fill the entire embed window */
      html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #231f20; }
      #unity-container { width: 100% !important; height: 100% !important; position: absolute; top: 0; left: 0; }
      #unity-canvas { width: 100% !important; height: 100% !important; aspect-ratio: 16 / 9; }
      
      /* Hide the default bulky footer */
      #unity-footer { display: none; } 

      /* Create a custom floating Fullscreen button */
      #custom-fullscreen-btn {
        position: fixed;
        right: 10px;
        bottom: 10px;
        width: 38px;
        height: 38px;
        background: rgba(0, 0, 0, 0.5);
        border: 2px solid white;
        border-radius: 5px;
        cursor: pointer;
        z-index: 100;
        display: none; /* Hidden until game loads */
        transition: transform 0.2s;
      }
      #custom-fullscreen-btn:hover { transform: scale(1.1); background: rgba(0, 0, 0, 0.8); }
      #custom-fullscreen-btn::after {
        content: "";
        position: absolute;
        top: 8px; left: 8px; right: 8px; bottom: 8px;
        border: 2px solid white;
        border-width: 2px 0 0 2px; /* Top-left corner icon */
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      
      <div id="custom-fullscreen-btn" title="Fullscreen"></div>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var fullscreenBtn = document.querySelector("#custom-fullscreen-btn");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Mice vs Slimes V0.2.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Mice vs Slimes V0.2.data.unityweb",
        frameworkUrl: buildUrl + "/Mice vs Slimes V0.2.framework.js.unityweb",
        codeUrl: buildUrl + "/Mice vs Slimes V0.2.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "CCM Industries",
        productName: "Mice vs Slimes",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "100%";
        canvas.style.height = "100%";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          
          // Show and activate the custom fullscreen button
          fullscreenBtn.style.display = "block";
          fullscreenBtn.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
