<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Mice vs Slimes</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      html, body { 
        width: 100%; height: 100%; margin: 0; padding: 0; 
        overflow: hidden; background-color: #000;
        display: flex; align-items: center; justify-content: center;
      }
      #unity-container { 
        position: relative; 
        /* This forces the container to STAY 16:9 regardless of the iFrame shape */
        width: 100vw; 
        height: 56.25vw; /* 100 * 9 / 16 */
        max-width: 177.78vh; /* 100 * 16 / 9 */
        max-height: 100vh;
      }
      #unity-canvas { 
        width: 100% !important; 
        height: 100% !important; 
        display: block;
      }
      #unity-footer { display: none; } 
      #custom-fullscreen-btn {
        position: absolute; right: 10px; bottom: 10px;
        width: 30px; height: 30px;
        background: rgba(255, 255, 255, 0.3);
        border: 1px solid #fff; border-radius: 4px;
        cursor: pointer; z-index: 100; display: none;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="custom-fullscreen-btn"></div>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var fullscreenBtn = document.querySelector("#custom-fullscreen-btn");

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Mice vs Slimes V0.2.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Mice vs Slimes V0.2.data.unityweb",
        frameworkUrl: buildUrl + "/Mice vs Slimes V0.2.framework.js.unityweb",
        codeUrl: buildUrl + "/Mice vs Slimes V0.2.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "CCM Industries",
        productName: "Mice vs Slimes",
        productVersion: "1.0",
        /* CRITICAL FOR UI SCALING: */
        matchWebGLToCanvasSize: true, 
        devicePixelRatio: 1, // Ensures 1:1 pixel mapping for UI
      };

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          fullscreenBtn.style.display = "block";
          fullscreenBtn.onclick = () => {
            // Note: If this fails in Google Sites, it is a browser security restriction
            unityInstance.SetFullscreen(1);
          };
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
